name: .NET Core Coverage

on:
  push:
    branches: [ main, codecov ]
  pull_request:
    branches: [ main, codecov ]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0' 

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test & Collect Coverage
      # Thêm --configuration Release để đồng bộ với bước build
      run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./results

    - name: Code Coverage Summary Report
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: 'results/**/*.xml' # Sử dụng wildcard khớp với kết quả dotnet test
        badge: true
        fail_below_min: false # Để pipeline không chết ngay, giúp bước comment vẫn chạy được
        format: markdown
        hide_branch_rate: false
        hide_complexity: true
        indicators: true
        output: both
        thresholds: '60 80'

    - name: Add Coverage PR Comment
      # Chỉ chạy khi có Pull Request
      uses: thollander/actions-comment-pull-request@v2
      if: github.event_name == 'pull_request'
      with:
        filePath: code-coverage-results.md 

    - name: ReportGenerator
      # Bước này tạo báo cáo HTML chi tiết để xem trong Step Summary
      uses: danielpalme/ReportGenerator-GitHub-Action@5.2.4
      with:
        reports: 'results/**/*.xml'
        targetdir: 'coveragereport'
        reporttypes: 'MarkdownSummary' 

    - name: Publish Coverage Summary
      # Đẩy tóm tắt vào GitHub Step Summary
      run: cat coveragereport/Summary.md >> $GITHUB_STEP_SUMMARY

    - name: ReportGenerator Detail
      uses: danielpalme/ReportGenerator-GitHub-Action@5.2.4
      with:
        reports: 'results/**/*.xml'
        targetdir: 'full-report'
        reporttypes: 'HtmlInline_AzurePipelines' # Định dạng HTML chuyên sâu

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: full-coverage-report # Tên file Zip bạn sẽ tải về
        path: full-report/

    - name: Check Coverage Threshold
      shell: pwsh
      run: |
        # Đọc file kết quả (giả sử chỉ có 1 file xml trong results)
        $report = Get-ChildItem -Path results -Filter *.xml -Recurse | Select-Object -First 1
        [xml]$xml = Get-Content $report.FullName
        
        # Lấy tỷ lệ bao phủ dòng (line-rate) - giá trị từ 0 đến 1
        $lineRate = [double]$xml.coverage."line-rate"
        $coveragePercent = $lineRate * 100
        $threshold = 80

        Write-Host "--- THÔNG TIN COVERAGE ---" -ForegroundColor Cyan
        Write-Host "Phần trăm bao phủ thực tế: $coveragePercent%"
        Write-Host "Ngưỡng yêu cầu: $threshold%"

        if ($coveragePercent -lt $threshold) {
            Write-Host "KẾT QUẢ: KHÔNG ĐẠT! Vui lòng bổ sung Unit Test." -ForegroundColor Red
            exit 1 # Lệnh này làm pipeline thất bại
        } else {
            Write-Host "KẾT QUẢ: ĐẠT TIÊU CHUẨN." -ForegroundColor Green
        }